name: Build Quvirl

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Rebuild every 1 hour to pull latest backend products.json
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: quvirl-build-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download latest products.json from backend repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing GH_TOKEN secret. Add GH_TOKEN in frontend repo secrets."
            exit 1
          fi

          curl -fL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/ayazzxcs/Droptrendv2-backend/contents/products.json?ref=main" \
            -o products.json

          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('products.json','utf8')); if(!Array.isArray(data)){throw new Error('products.json is not an array')} console.log('Downloaded products:', data.length)"

      - name: Patch CJ supplier links
        run: |
          if [ -f patch-cj-links.js ]; then node patch-cj-links.js; else echo "patch-cj-links.js not found, skipping"; fi

      - name: Generate static product pages and sitemap
        env:
          SITE_URL: https://quvirl.com
          MAX_PRODUCT_PAGES: 1500
        run: |
          node generate-static-product-pages.js

      - name: Patch homepage copy
        run: |
          if [ -f patch-home-copy.js ]; then node patch-home-copy.js; else echo "patch-home-copy.js not found, skipping"; fi

      - name: Patch homepage UI
        run: |
          if [ -f patch-home-ui.js ]; then node patch-home-ui.js; else echo "patch-home-ui.js not found, skipping"; fi

      - name: Apply Quvirl branding and final fixes
        run: |
          if [ -f patch-quvirl-brand.js ]; then node patch-quvirl-brand.js; else echo "patch-quvirl-brand.js not found, skipping"; fi

      - name: Fix signal hub layout
        run: |
          if [ -f patch-signal-hub-layout.js ]; then node patch-signal-hub-layout.js; else echo "patch-signal-hub-layout.js not found, skipping"; fi

      - name: Patch homepage product background
        run: |
          if [ -f patch-home-background.js ]; then node patch-home-background.js; else echo "patch-home-background.js not found, skipping"; fi

      - name: Patch product card links
        run: |
          if [ -f patch-product-links.js ]; then node patch-product-links.js; else echo "patch-product-links.js not found, skipping"; fi

      - name: Apply Vercel SEO canonical fixes
        run: |
          node patch-seo-vercel.js

      - name: Apply email verified slot access gate
        run: |
          node patch-slot-access.js

      - name: Add Adcash 728x90 banner to generated pages only
        run: |
          .js <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const ADCASH_DISPLAY_ZONE_ID = '11748834';

          const openScript = '<' + 'script';
          const closeScript = '<' + '/script>';

          const ADCASH_LIBRARY = [
            '  <!-- Adcash Library -->',
            '  ' + openScript + ' id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js">' + closeScript,
            '  <!-- End Adcash Library -->'
          ].join('\n');

          const ADCASH_BANNER = [
            '  <!-- Adcash Display Banner 728x90 -->',
            '  <div class="quvirl-adcash-wrap" style="max-width:760px;margin:34px auto 28px auto;padding:10px 12px;border:1px solid rgba(48,54,61,.55);border-radius:16px;background:rgba(13,17,23,.72);text-align:center;">',
            '    <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#8b949e;margin-bottom:8px;">Advertisement</div>',
            '    <div class="quvirl-adcash-banner quvirl-adcash-banner-728x90" style="display:flex;justify-content:center;align-items:center;min-height:90px;width:100%;max-width:728px;margin:0 auto;overflow:hidden;">',
            '      ' + openScript + ' type="text/javascript">',
            '        aclib.runBanner({',
            "          zoneId: '" + ADCASH_DISPLAY_ZONE_ID + "',",
            '        });',
            '      ' + closeScript,
            '    </div>',
            '  </div>',
            '  <!-- End Adcash Display Banner 728x90 -->'
          ].join('\n');

          const ADCASH_LIBRARY_REGEX = /\n?\s*<!-- Adcash Library -->[\s\S]*?<!-- End Adcash Library -->\s*/gi;
          const ADCASH_BANNER_728_REGEX = /\n?\s*<!-- Adcash Display Banner 728x90 -->[\s\S]*?<!-- End Adcash Display Banner 728x90 -->\s*/gi;
          const ADCASH_BANNER_336_REGEX = /\n?\s*<!-- Adcash Display Banner 336x280 -->[\s\S]*?<!-- End Adcash Display Banner 336x280 -->\s*/gi;
          const OLD_AUTOTAG_BLOCK_REGEX = /\n?\s*<!-- Adcash AutoTag -->[\s\S]*?<!-- End Adcash AutoTag -->\s*/gi;

          const SKIP_ROOT_FILES = new Set([
            'index.html',
            'privacy.html',
            'terms.html',
            'contact.html',
            'about.html',
            'slot-verify.html'
          ]);

          function walk(dir, files = []) {
            if (!fs.existsSync(dir)) return files;

            for (const name of fs.readdirSync(dir)) {
              const fullPath = path.join(dir, name);
              const stat = fs.statSync(fullPath);

              if (stat.isDirectory()) {
                if (
                  name === '.git' ||
                  name === 'node_modules' ||
                  name === '.vercel' ||
                  name === '.wrangler'
                ) {
                  continue;
                }

                walk(fullPath, files);
              } else if (name.endsWith('.html')) {
                files.push(fullPath);
              }
            }

            return files;
          }

          function patchHtml(filePath) {
            const relPath = path.relative(process.cwd(), filePath).replace(/\\/g, '/');
            const baseName = path.basename(filePath);

            let html = fs.readFileSync(filePath, 'utf8');
            const original = html;

            // Always remove old Adcash from every page first, including homepage.
            html = html.replace(ADCASH_LIBRARY_REGEX, '\n');
            html = html.replace(ADCASH_BANNER_728_REGEX, '\n');
            html = html.replace(ADCASH_BANNER_336_REGEX, '\n');
            html = html.replace(OLD_AUTOTAG_BLOCK_REGEX, '\n');

            // Remove old leftover zone IDs.
            html = html.replace(/11748834/g, '');
            html = html.replace(/11748766/g, '');
            html = html.replace(/ghbh1xtplz/g, '');

            // Skip adding Adcash back to homepage/root legal pages.
            if (SKIP_ROOT_FILES.has(relPath)) {
              if (html !== original) {
                fs.writeFileSync(filePath, html, 'utf8');
                return true;
              }
              return false;
            }

            // Skip Google verification files.
            if (baseName.startsWith('google') && baseName.endsWith('.html')) {
              if (html !== original) {
                fs.writeFileSync(filePath, html, 'utf8');
                return true;
              }
              return false;
            }

            if (!/<\/head>/i.test(html) || !/<\/body>/i.test(html)) {
              if (html !== original) {
                fs.writeFileSync(filePath, html, 'utf8');
                return true;
              }
              return false;
            }

            // Add Adcash library inside head.
            html = html.replace(/<\/head>/i, `${ADCASH_LIBRARY}\n</head>`);

            // Add banner lower/downside, before footer if possible.
            if (/<footer[^>]*>/i.test(html)) {
              html = html.replace(/<footer/i, `${ADCASH_BANNER}\n<footer`);
            } else {
              html = html.replace(/<\/body>/i, `${ADCASH_BANNER}\n</body>`);
            }

            if (html !== original) {
              fs.writeFileSync(filePath, html, 'utf8');
              return true;
            }

            return false;
          }

          let changed = 0;

          for (const filePath of walk(process.cwd())) {
            if (patchHtml(filePath)) {
              changed++;
              console.log('Updated Adcash generated page:', path.relative(process.cwd(), filePath));
            }
          }

          console.log(`Adcash generated-page patch complete. HTML files changed: ${changed}`);
          NODE

          node patch-adcash-generated-pages.js
          rm patch-adcash-generated-pages.js
      
      - name: Add CJdropshipping affiliate banners to Quvirl pages
        run: |
          cat > patch-cj-affiliate-banners.js <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const CJ_SERVICE_URL = 'https://www.cjdropshipping.com/ouroffers?token=d2d687f6-4fae-4758-9231-7c01dc4dce1d';
          const CJ_HOME_URL = 'https://www.cjdropshipping.com/?token=d2d687f6-4fae-4758-9231-7c01dc4dce1d';
          const CJ_REGISTER_URL = 'https://www.cjdropshipping.com/register.html?token=d2d687f6-4fae-4758-9231-7c01dc4dce1d';
          const CJ_SHOPIFY_APP_URL = 'https://www.cjdropshipping.com/tempPage.html?token=d2d687f6-4fae-4758-9231-7c01dc4dce1d';

          function button(url, label, primary = false) {
          const bg = primary ? '#16a34a' : '#0d1117';
          const border = primary ? '#34d399' : '#30363d';
          const color = primary ? '#001b0b' : '#f0f6fc';

          const openA = '<' + 'a';
          const closeA = '<' + '/a>';

          return openA
           + ' href="' + url + '"'
           + ' target="_blank"'
           + ' rel="nofollow sponsored noopener"'
           + ' style="display:inline-flex;align-items:center;justify-content:center;padding:11px 14px;border-radius:12px;background:' + bg + ';border:1px solid ' + border + ';color:' + color + ';font-weight:800;text-decoration:none;font-size:14px;line-height:1;"'
           + '>'
           + label
           + closeA;
          }

          const CJ_BLOCK = `
          <!-- Quvirl CJdropshipping Affiliate Banner -->
          <section class="quvirl-cj-affiliate-banner" style="max-width:1180px;margin:22px auto;padding:22px;border:1px solid rgba(48,54,61,.9);border-radius:22px;background:linear-gradient(135deg,#0d1117,#07121f);color:#f0f6fc;box-shadow:0 18px 50px rgba(0,0,0,.32);">
            <div style="display:flex;flex-wrap:wrap;gap:18px;align-items:center;justify-content:space-between;">
              <div style="flex:1;min-width:260px;">
                <div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:10px;padding:6px 10px;border:1px solid rgba(126,231,135,.35);border-radius:999px;color:#7ee787;font-size:13px;font-weight:700;">
                  Recommended sourcing tool
                </div>
                <h2 style="margin:0 0 8px;font-size:clamp(24px,4vw,38px);line-height:1.05;color:#fff;">
                  Found a product on Quvirl? Source it with CJdropshipping.
                </h2>
                <p style="margin:0;color:#c9d1d9;font-size:16px;line-height:1.55;">
                  Use CJdropshipping to explore sourcing, fulfillment, supplier services, and Shopify store integration after shortlisting product ideas on Quvirl.
                </p>
              </div>

              <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:flex-start;min-width:260px;">
                ${button(CJ_REGISTER_URL, 'Create CJ account', true)}
                ${button(CJ_SERVICE_URL, 'View CJ services')}
                ${button(CJ_SHOPIFY_APP_URL, 'Shopify app')}
                ${button(CJ_HOME_URL, 'Visit CJ')}
              </div>
            </div>
          </section>
          <!-- End Quvirl CJdropshipping Affiliate Banner -->
          `;

          const CJ_BLOCK_REGEX = /\n?\s*<!-- Quvirl CJdropshipping Affiliate Banner -->[\s\S]*?<!-- End Quvirl CJdropshipping Affiliate Banner -->\s*/gi;

          const SKIP_PATH_PARTS = [
            '.git',
            'node_modules',
            '.vercel',
            '.wrangler'
          ];

          const SKIP_ROOT_FILES = new Set([
            'index.html',
            'privacy.html',
            'terms.html',
            'contact.html',
            'about.html',
            'slot-verify.html'
          ]);

          function shouldSkipDirectory(filePath) {
            return SKIP_PATH_PARTS.some(part => filePath.split(path.sep).includes(part));
          }

          function walk(dir, files = []) {
            if (!fs.existsSync(dir)) return files;

            for (const name of fs.readdirSync(dir)) {
              const fullPath = path.join(dir, name);
              const stat = fs.statSync(fullPath);

              if (stat.isDirectory()) {
                if (!shouldSkipDirectory(fullPath)) {
                  walk(fullPath, files);
                }
              } else if (name.endsWith('.html')) {
                files.push(fullPath);
              }
            }

            return files;
          }

          function patchHtml(filePath) {
            const relPath = path.relative(process.cwd(), filePath).replace(/\\/g, '/');

            let html = fs.readFileSync(filePath, 'utf8');
            const original = html;

            // Always remove old CJ banner first, even from homepage.
            html = html.replace(CJ_BLOCK_REGEX, '\n');

            // Skip adding banner back to root homepage and root legal/contact pages.
            if (SKIP_ROOT_FILES.has(relPath)) {
              if (html !== original) {
                fs.writeFileSync(filePath, html);
                return true;
              }
              return false;
            }

            if (path.basename(filePath).startsWith('google') && path.basename(filePath).endsWith('.html')) {
              if (html !== original) {
                fs.writeFileSync(filePath, html);
                return true;
              }
              return false;
            }

            if (!/<body[^>]*>/i.test(html)) {
              if (html !== original) {
                fs.writeFileSync(filePath, html);
                return true;
              }
              return false;
            }

            if (html.includes('<!-- Adcash Display Banner 728x90 -->')) {
              html = html.replace(
                /<!-- End Adcash Display Banner 728x90 -->/i,
                `<!-- End Adcash Display Banner 728x90 -->\n${CJ_BLOCK}`
              );
            } else {
              html = html.replace(/<body([^>]*)>/i, `<body$1>\n${CJ_BLOCK}`);
            }

            if (html !== original) {
              fs.writeFileSync(filePath, html);
              return true;
            }

            return false;
          }

          let changed = 0;

          for (const filePath of walk(process.cwd())) {
            if (patchHtml(filePath)) {
              changed++;
              console.log('Updated CJ affiliate banner:', path.relative(process.cwd(), filePath));
            }
          }

          console.log(`CJ affiliate banner patch complete. HTML files changed: ${changed}`);
          NODE

          node patch-cj-affiliate-banners.js
          rm patch-cj-affiliate-banners.js
            
      - name: Add correct Google Analytics tag to all HTML pages
        run: |
          cat > patch-google-analytics.js <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const GA_ID = 'G-Y5QM3GGPWE';
          const OLD_GA_ID = 'G-Y5QM3GGPPWE';

          const openScript = '<' + 'script';
          const closeScript = '<' + '/script>';

          const GA_TAG = [
            '  <!-- Google Analytics -->',
            '  ' + openScript + ' async src="https://www.googletagmanager.com/gtag/js?id=' + GA_ID + '">' + closeScript,
            '  ' + openScript + '>',
            '    window.dataLayer = window.dataLayer || [];',
            '    function gtag(){dataLayer.push(arguments);}',
            "    gtag('js', new Date());",
            "    gtag('config', '" + GA_ID + "');",
            '  ' + closeScript,
            '  <!-- End Google Analytics -->'
          ].join('\n');

          const GA_BLOCK_REGEX = /\n?\s*<!-- Google Analytics -->[\s\S]*?<!-- End Google Analytics -->\s*/gi;
          const OLD_ID_REGEX = new RegExp(OLD_GA_ID, 'g');
          const BROKEN_OLD_GA_REGEX = /https:\/\/www\.googletagmanager\.com\/gtag\/js\?id=G-Y5QM3GGPPWEscript>/g;
          const BROKEN_NEW_GA_REGEX = /https:\/\/www\.googletagmanager\.com\/gtag\/js\?id=G-Y5QM3GGPWEscript>/g;

          function walk(dir, files = []) {
            if (!fs.existsSync(dir)) return files;

            for (const name of fs.readdirSync(dir)) {
              const fullPath = path.join(dir, name);
              const stat = fs.statSync(fullPath);

              if (stat.isDirectory()) {
                if (
                  name === '.git' ||
                  name === 'node_modules' ||
                  name === '.vercel' ||
                  name === '.wrangler'
                ) {
                  continue;
                }

                walk(fullPath, files);
              } else if (name.endsWith('.html')) {
                files.push(fullPath);
              }
            }

            return files;
          }

          function injectIntoHtml(filePath) {
            let html = fs.readFileSync(filePath, 'utf8');
            const original = html;

            if (!/<\/head>/i.test(html)) {
              return false;
            }

            // Remove any existing GA block, including the old wrong ID block.
            html = html.replace(GA_BLOCK_REGEX, '\n');

            // Remove broken leftovers if they exist.
            html = html.replace(BROKEN_OLD_GA_REGEX, '');
            html = html.replace(BROKEN_NEW_GA_REGEX, '');

            // Replace wrong ID if it exists anywhere else.
            html = html.replace(OLD_ID_REGEX, GA_ID);

            // Add clean GA4 tag before closing head.
            html = html.replace(/<\/head>/i, `${GA_TAG}\n</head>`);

            if (html !== original) {
              fs.writeFileSync(filePath, html);
              return true;
            }

            return false;
          }

          let changed = 0;

          for (const filePath of walk(process.cwd())) {
            if (injectIntoHtml(filePath)) {
              changed++;
              console.log('Updated GA:', path.relative(process.cwd(), filePath));
            }
          }

          console.log(`Google Analytics patch complete. HTML files changed: ${changed}`);
          NODE

          node patch-google-analytics.js
          rm patch-google-analytics.js

      - name: Add Monetag Vignette to all public pages
        run: |
          cat > patch-monetag-vignette.js <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const MONETAG_ZONE_ID = '11345816';

          const openScript = '<' + 'script';
          const closeScript = '<' + '/script>';

          const MONETAG_VIGNETTE = [
            '  <!-- Monetag Vignette Banner -->',
            '  ' + openScript + '>',
            "    (function(s){s.dataset.zone='" + MONETAG_ZONE_ID + "';s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))",
            '  ' + closeScript,
            '  <!-- End Monetag Vignette Banner -->'
          ].join('\n');

          const MONETAG_VIGNETTE_REGEX = /\n?\s*<!-- Monetag Vignette Banner -->[\s\S]*?<!-- End Monetag Vignette Banner -->\s*/gi;

          const SKIP_FILES = new Set([
            'slot-verify.html'
          ]);

          function walk(dir, files = []) {
            if (!fs.existsSync(dir)) return files;

            for (const name of fs.readdirSync(dir)) {
              const fullPath = path.join(dir, name);
              const stat = fs.statSync(fullPath);

              if (stat.isDirectory()) {
                if (
                  name === '.git' ||
                  name === 'node_modules' ||
                  name === '.vercel' ||
                  name === '.wrangler'
                ) {
                  continue;
                }

                walk(fullPath, files);
              } else if (name.endsWith('.html')) {
                files.push(fullPath);
              }
            }

            return files;
          }

          function patchHtml(filePath) {
            const baseName = path.basename(filePath);

            if (SKIP_FILES.has(baseName)) {
              return false;
            }

            if (baseName.startsWith('google') && baseName.endsWith('.html')) {
              return false;
            }

            let html = fs.readFileSync(filePath, 'utf8');
            const original = html;

            html = html.replace(MONETAG_VIGNETTE_REGEX, '\n');

            if (!/<\/body>/i.test(html)) {
              if (html !== original) {
                fs.writeFileSync(filePath, html, 'utf8');
                return true;
              }
              return false;
            }

            html = html.replace(/<\/body>/i, `${MONETAG_VIGNETTE}\n</body>`);

            if (html !== original) {
              fs.writeFileSync(filePath, html, 'utf8');
              return true;
            }

            return false;
          }

          let changed = 0;

          for (const filePath of walk(process.cwd())) {
            if (patchHtml(filePath)) {
              changed++;
              console.log('Updated Monetag Vignette:', path.relative(process.cwd(), filePath));
            }
          }

          console.log(`Monetag Vignette patch complete. HTML files changed: ${changed}`);
          NODE

          node patch-monetag-vignette.js
          rm patch-monetag-vignette.js
    
      - name: Add Monetag verification meta tag
        run: |
          cat > patch-monetag-verification.js <<'NODE'
          const fs = require('fs');

          const filePath = 'index.html';
          const MONETAG_META = '<meta name="monetag" content="d344576bb6c59fcd0d1df124b80bb512">';

          if (!fs.existsSync(filePath)) {
            throw new Error('index.html not found');
          }

          let html = fs.readFileSync(filePath, 'utf8');

          // Remove old Monetag verification meta tag if it exists.
          html = html.replace(/<meta\s+name=["']monetag["'][^>]*>\s*/gi, '');

          if (!/<\/head>/i.test(html)) {
            throw new Error('No </head> tag found in index.html');
          }

          // Add fresh Monetag verification tag before </head>.
          html = html.replace(/<\/head>/i, `  ${MONETAG_META}\n</head>`);

          fs.writeFileSync(filePath, html, 'utf8');

          console.log('Monetag verification meta tag added to index.html');
          NODE

          node patch-monetag-verification.js
          rm patch-monetag-verification.js

      - name: Validate Quvirl output
        run: |
          set -euo pipefail

          echo "Checking homepage canonical..."
          grep -q 'rel="canonical" href="https://quvirl.com/"' index.html

          echo "Checking sitemap domain..."
          grep -q 'https://quvirl.com' sitemap.xml

          echo "Checking correct Google Analytics ID on homepage..."
          grep -q 'G-Y5QM3GGPWE' index.html
          grep -q 'googletagmanager.com/gtag/js?id=G-Y5QM3GGPWE' index.html
          grep -q "gtag('config', 'G-Y5QM3GGPWE')" index.html

          echo "Checking old wrong Google Analytics ID is gone..."
          if grep -R "G-Y5QM3GGPPWE" . \
            --include="*.html" \
            --exclude-dir=.git \
            --exclude-dir=node_modules; then
            echo "Old wrong Google Analytics ID still exists."
            exit 1
          fi

          echo "Checking broken Google Analytics tag..."
          if grep -R "G-Y5QM3GGPWEscript>" . \
            --include="*.html" \
            --exclude-dir=.git \
            --exclude-dir=node_modules; then
            echo "Broken Google Analytics script tag found."
            exit 1
          fi

          echo "Checking slot access script on homepage..."
          grep -q 'slot-access.js' index.html

          echo "Checking slot access script on product template..."
          grep -q 'slot-access.js' product.html

          echo "Checking verification page..."
          test -f slot-verify.html

          echo "Checking required API files..."
          test -f api/access-status.js
          test -f api/reserve-slot.js
          test -f api/confirm-slot.js
          test -f lib/slot-utils.js
          test -f slot-access.js

          echo "Checking required SQL schema file..."
          test -f slot-access-schema.sql

          echo "Checking old Cloudflare domain in public files..."
          if grep -R "droptrend.pages.dev" . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude="deploy.yml" \
            --exclude="*.zip"; then
            echo "Old droptrend.pages.dev URL still exists. Fix before deploy."
            exit 1
          fi

          echo "Checking Adcash banner is not on homepage..."
          if grep -q 'Adcash Display Banner 728x90' index.html; then
           echo "Adcash banner should not appear on homepage."
           exit 1
          fi

          echo "Checking Adcash banner exists on generated pages..."
          if ! grep -R -q '11748834' . \
            --include="*.html" \
            --exclude="index.html" \
            --exclude-dir=.git \
            --exclude-dir=node_modules; then
            echo "Adcash banner was not found on generated pages."
            exit 1
          fi

          echo "Checking Monetag Vignette on homepage..."
          grep -q '11345816' index.html
          grep -q 'n6wxm.com/vignette.min.js' index.html
          grep -q 'Monetag Vignette Banner' index.html

          echo "Checking Monetag Vignette exists on generated pages..."
          if ! grep -R -q '11345816' . \
            --include="*.html" \
            --exclude-dir=.git \
            --exclude-dir=node_modules; then
            echo "Monetag Vignette was not found."
            exit 1
          fi

          echo "Checking old Adcash AutoTag and 336x280 zone are gone..."
          if grep -R "ghbh1xtplz\|11748766" . \
            --include="*.html" \
            --exclude-dir=.git \
            --exclude-dir=node_modules; then
            echo "Old Adcash AutoTag or 336x280 zone still exists."
            exit 1
          fi
 
          echo "Checking CJ affiliate banner is not on homepage..."
          if grep -q 'Quvirl CJdropshipping Affiliate Banner' index.html; then
          echo "CJ affiliate banner should not appear on homepage."
          exit 1
          fi

          echo "Checking CJ affiliate banner exists on generated pages..."
          if ! grep -R -q 'd2d687f6-4fae-4758-9231-7c01dc4dce1d' . \
            --include="*.html" \
            --exclude="index.html" \
            --exclude-dir=.git \
            --exclude-dir=node_modules; then
          echo "CJ affiliate banner was not found on generated pages."
          exit 1
          fi

          echo "Checking CJ affiliate links use sponsored nofollow..."
          if ! grep -R -q 'rel="nofollow sponsored noopener"' . \
            --include="*.html" \
            --exclude="index.html" \
            --exclude-dir=.git \
            --exclude-dir=node_modules; then
          echo "CJ affiliate sponsored nofollow attributes not found."
          exit 1
          fi

          echo "Checking Monetag verification meta tag..."
          grep -q 'meta name="monetag" content="d344576bb6c59fcd0d1df124b80bb512"' index.html

          echo "Validation passed."

      - name: Commit generated Quvirl pages
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --staged --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "Fix Google Analytics measurement ID"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
