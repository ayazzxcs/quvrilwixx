name: Build Quvirl

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Rebuild every 1 hour to pull latest backend products.json
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: quvirl-build-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frontend repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download latest products.json from backend repo
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN:-}" ]; then
            echo "Missing GH_TOKEN secret. Add GH_TOKEN in frontend repo secrets."
            exit 1
          fi

          curl -fL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/ayazzxcs/Droptrendv2-backend/contents/products.json?ref=main" \
            -o products.json

          node -e "const fs=require('fs'); const data=JSON.parse(fs.readFileSync('products.json','utf8')); if(!Array.isArray(data)){throw new Error('products.json is not an array')} console.log('Downloaded products:', data.length)"

      - name: Patch CJ supplier links
        run: |
          if [ -f patch-cj-links.js ]; then node patch-cj-links.js; else echo "patch-cj-links.js not found, skipping"; fi

      - name: Generate static product pages and sitemap
        env:
          SITE_URL: https://quvirl.com
          MAX_PRODUCT_PAGES: 1500
        run: |
          node generate-static-product-pages.js

      - name: Patch homepage copy
        run: |
          if [ -f patch-home-copy.js ]; then node patch-home-copy.js; else echo "patch-home-copy.js not found, skipping"; fi

      - name: Patch homepage UI
        run: |
          if [ -f patch-home-ui.js ]; then node patch-home-ui.js; else echo "patch-home-ui.js not found, skipping"; fi

      - name: Apply Quvirl branding and final fixes
        run: |
          if [ -f patch-quvirl-brand.js ]; then node patch-quvirl-brand.js; else echo "patch-quvirl-brand.js not found, skipping"; fi

      - name: Fix signal hub layout
        run: |
          if [ -f patch-signal-hub-layout.js ]; then node patch-signal-hub-layout.js; else echo "patch-signal-hub-layout.js not found, skipping"; fi

      - name: Patch homepage product background
        run: |
          if [ -f patch-home-background.js ]; then node patch-home-background.js; else echo "patch-home-background.js not found, skipping"; fi

      - name: Patch product card links
        run: |
          if [ -f patch-product-links.js ]; then node patch-product-links.js; else echo "patch-product-links.js not found, skipping"; fi

      - name: Apply Vercel SEO canonical fixes
        run: |
          node patch-seo-vercel.js

      - name: Apply email verified slot access gate
        run: |
          node patch-slot-access.js

      - name: Add Adcash display banner ads to all HTML pages
        run: |
          cat > patch-adcash-display.js <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const ADCASH_DISPLAY_ZONE_ID = '11748766';
          const OLD_AUTOTAG_ZONE_ID = 'ghbh1xtplz';

          const openScript = '<' + 'script';
          const closeScript = '<' + '/script>';

          const ADCASH_LIBRARY = [
            '  <!-- Adcash Library -->',
            '  ' + openScript + ' id="aclib" type="text/javascript" src="//acscdn.com/script/aclib.js">' + closeScript,
            '  <!-- End Adcash Library -->'
          ].join('\n');

          const ADCASH_BANNER = [
            '  <!-- Adcash Display Banner 336x280 -->',
            '  <div class="quvirl-adcash-banner" style="display:flex;justify-content:center;align-items:center;margin:24px auto;min-height:280px;width:100%;max-width:336px;">',
            '    ' + openScript + ' type="text/javascript">',
            '      aclib.runBanner({',
            "        zoneId: '" + ADCASH_DISPLAY_ZONE_ID + "',",
            '      });',
            '    ' + closeScript,
            '  </div>',
            '  <!-- End Adcash Display Banner 336x280 -->'
          ].join('\n');

          const ADCASH_LIBRARY_REGEX = /\n?\s*<!-- Adcash Library -->[\s\S]*?<!-- End Adcash Library -->\s*/gi;
          const ADCASH_BANNER_REGEX = /\n?\s*<!-- Adcash Display Banner 336x280 -->[\s\S]*?<!-- End Adcash Display Banner 336x280 -->\s*/gi;
          const OLD_AUTOTAG_BLOCK_REGEX = /\n?\s*<!-- Adcash AutoTag -->[\s\S]*?<!-- End Adcash AutoTag -->\s*/gi;
          const OLD_AUTOTAG_ZONE_REGEX = new RegExp(OLD_AUTOTAG_ZONE_ID, 'g');

          function walk(dir, files = []) {
            if (!fs.existsSync(dir)) return files;

            for (const name of fs.readdirSync(dir)) {
              const fullPath = path.join(dir, name);
              const stat = fs.statSync(fullPath);

              if (stat.isDirectory()) {
                if (
                  name === '.git' ||
                  name === 'node_modules' ||
                  name === '.vercel' ||
                  name === '.wrangler'
                ) {
                  continue;
                }

                walk(fullPath, files);
              } else if (name.endsWith('.html')) {
                files.push(fullPath);
              }
            }

            return files;
          }

          function patchHtml(filePath) {
            let html = fs.readFileSync(filePath, 'utf8');
            const original = html;

            if (!/<\/head>/i.test(html) || !/<body[^>]*>/i.test(html)) {
              return false;
            }

            // Remove previous Adcash blocks if the workflow has run before.
            html = html.replace(ADCASH_LIBRARY_REGEX, '\n');
            html = html.replace(ADCASH_BANNER_REGEX, '\n');

            // Remove old AutoTag block if it was added before.
            html = html.replace(OLD_AUTOTAG_BLOCK_REGEX, '\n');

            // If old AutoTag zone ID appears anywhere else, leave the file clean.
            html = html.replace(OLD_AUTOTAG_ZONE_REGEX, '');

            // Add Adcash library inside head.
            html = html.replace(/<\/head>/i, `${ADCASH_LIBRARY}\n</head>`);

            // Add visible 336x280 banner immediately after opening body.
            html = html.replace(/<body([^>]*)>/i, `<body$1>\n${ADCASH_BANNER}`);

            if (html !== original) {
              fs.writeFileSync(filePath, html);
              return true;
            }

            return false;
          }

          let changed = 0;

          for (const filePath of walk(process.cwd())) {
            if (patchHtml(filePath)) {
              changed++;
              console.log('Updated Adcash display banner:', path.relative(process.cwd(), filePath));
            }
          }

          console.log(`Adcash display banner patch complete. HTML files changed: ${changed}`);
          NODE

          node patch-adcash-display.js
          rm patch-adcash-display.js

      - name: Add correct Google Analytics tag to all HTML pages
        run: |
          cat > patch-google-analytics.js <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const GA_ID = 'G-Y5QM3GGPWE';
          const OLD_GA_ID = 'G-Y5QM3GGPPWE';

          const openScript = '<' + 'script';
          const closeScript = '<' + '/script>';

          const GA_TAG = [
            '  <!-- Google Analytics -->',
            '  ' + openScript + ' async src="https://www.googletagmanager.com/gtag/js?id=' + GA_ID + '">' + closeScript,
            '  ' + openScript + '>',
            '    window.dataLayer = window.dataLayer || [];',
            '    function gtag(){dataLayer.push(arguments);}',
            "    gtag('js', new Date());",
            "    gtag('config', '" + GA_ID + "');",
            '  ' + closeScript,
            '  <!-- End Google Analytics -->'
          ].join('\n');

          const GA_BLOCK_REGEX = /\n?\s*<!-- Google Analytics -->[\s\S]*?<!-- End Google Analytics -->\s*/gi;
          const OLD_ID_REGEX = new RegExp(OLD_GA_ID, 'g');
          const BROKEN_OLD_GA_REGEX = /https:\/\/www\.googletagmanager\.com\/gtag\/js\?id=G-Y5QM3GGPPWEscript>/g;
          const BROKEN_NEW_GA_REGEX = /https:\/\/www\.googletagmanager\.com\/gtag\/js\?id=G-Y5QM3GGPWEscript>/g;

          function walk(dir, files = []) {
            if (!fs.existsSync(dir)) return files;

            for (const name of fs.readdirSync(dir)) {
              const fullPath = path.join(dir, name);
              const stat = fs.statSync(fullPath);

              if (stat.isDirectory()) {
                if (
                  name === '.git' ||
                  name === 'node_modules' ||
                  name === '.vercel' ||
                  name === '.wrangler'
                ) {
                  continue;
                }

                walk(fullPath, files);
              } else if (name.endsWith('.html')) {
                files.push(fullPath);
              }
            }

            return files;
          }

          function injectIntoHtml(filePath) {
            let html = fs.readFileSync(filePath, 'utf8');
            const original = html;

            if (!/<\/head>/i.test(html)) {
              return false;
            }

            // Remove any existing GA block, including the old wrong ID block.
            html = html.replace(GA_BLOCK_REGEX, '\n');

            // Remove broken leftovers if they exist.
            html = html.replace(BROKEN_OLD_GA_REGEX, '');
            html = html.replace(BROKEN_NEW_GA_REGEX, '');

            // Replace wrong ID if it exists anywhere else.
            html = html.replace(OLD_ID_REGEX, GA_ID);

            // Add clean GA4 tag before closing head.
            html = html.replace(/<\/head>/i, `${GA_TAG}\n</head>`);

            if (html !== original) {
              fs.writeFileSync(filePath, html);
              return true;
            }

            return false;
          }

          let changed = 0;

          for (const filePath of walk(process.cwd())) {
            if (injectIntoHtml(filePath)) {
              changed++;
              console.log('Updated GA:', path.relative(process.cwd(), filePath));
            }
          }

          console.log(`Google Analytics patch complete. HTML files changed: ${changed}`);
          NODE

          node patch-google-analytics.js
          rm patch-google-analytics.js

      - name: Validate Quvirl output
        run: |
          set -euo pipefail

          echo "Checking homepage canonical..."
          grep -q 'rel="canonical" href="https://quvirl.com/"' index.html

          echo "Checking sitemap domain..."
          grep -q 'https://quvirl.com' sitemap.xml

          echo "Checking correct Google Analytics ID on homepage..."
          grep -q 'G-Y5QM3GGPWE' index.html
          grep -q 'googletagmanager.com/gtag/js?id=G-Y5QM3GGPWE' index.html
          grep -q "gtag('config', 'G-Y5QM3GGPWE')" index.html

          echo "Checking old wrong Google Analytics ID is gone..."
          if grep -R "G-Y5QM3GGPPWE" . \
            --include="*.html" \
            --exclude-dir=.git \
            --exclude-dir=node_modules; then
            echo "Old wrong Google Analytics ID still exists."
            exit 1
          fi

          echo "Checking broken Google Analytics tag..."
          if grep -R "G-Y5QM3GGPWEscript>" . \
            --include="*.html" \
            --exclude-dir=.git \
            --exclude-dir=node_modules; then
            echo "Broken Google Analytics script tag found."
            exit 1
          fi

          echo "Checking slot access script on homepage..."
          grep -q 'slot-access.js' index.html

          echo "Checking slot access script on product template..."
          grep -q 'slot-access.js' product.html

          echo "Checking verification page..."
          test -f slot-verify.html

          echo "Checking required API files..."
          test -f api/access-status.js
          test -f api/reserve-slot.js
          test -f api/confirm-slot.js
          test -f lib/slot-utils.js
          test -f slot-access.js

          echo "Checking required SQL schema file..."
          test -f slot-access-schema.sql

          echo "Checking old Cloudflare domain in public files..."
          if grep -R "droptrend.pages.dev" . \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            --exclude="deploy.yml" \
            --exclude="*.zip"; then
            echo "Old droptrend.pages.dev URL still exists. Fix before deploy."
            exit 1
          fi

          echo "Checking Adcash display banner on homepage..."
          grep -q '11748766' index.html
          grep -q 'acscdn.com/script/aclib.js' index.html
          grep -q 'aclib.runBanner' index.html
 
          echo "Checking old Adcash AutoTag is gone..."
          if grep -R "ghbh1xtplz" . \
            --include="*.html" \
            --exclude-dir=.git \
            --exclude-dir=node_modules; then
          echo "Old Adcash AutoTag zone still exists."
            exit 1
          fi
 
          echo "Validation passed."

      - name: Commit generated Quvirl pages
        run: |
          set -euo pipefail

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          if git diff --staged --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "Fix Google Analytics measurement ID"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
