name: Build Quvirl

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: quvirl-build-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download latest products.json
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -fL \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            https://raw.githubusercontent.com/ayazzxcs/Droptrendv2-backend/main/products.json \
            -o products.json

      - name: Patch CJ supplier links
        run: |
          node patch-cj-links.js

      - name: Generate static product pages
        run: |
          node generate-static-product-pages.js

      - name: Patch homepage copy
        run: |
          node patch-home-copy.js

      - name: Patch homepage UI
        run: |
          node patch-home-ui.js

      - name: Apply Quvirl branding and final fixes
        run: |
          node patch-quvirl-brand.js

      - name: Fix signal hub layout
        run: |
          node patch-signal-hub-layout.js

      - name: Patch homepage product background
        run: |
          node patch-home-background.js

      - name: Patch product card links
        run: |
          node patch-product-links.js

      - name: Commit generated pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "Update Quvirl pages"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
