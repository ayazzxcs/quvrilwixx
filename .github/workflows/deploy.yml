name: Build DropTrend

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 * * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download latest products.json
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          curl -L \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.raw" \
            https://raw.githubusercontent.com/ayazzxcs/Droptrendv2-backend/main/products.json \
            -o products.json

      - name: Patch CJ supplier links
        run: |
          node patch-cj-links.js

      - name: Generate static product pages
        run: |
          node generate-static-product-pages.js

      - name: Patch homepage product background
        run: |
          node patch-home-background.js

      - name: Commit generated pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git diff --staged --quiet || git commit -m "Update monthly SEO pages"
          git push
